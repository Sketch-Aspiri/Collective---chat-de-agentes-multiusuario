apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentes-chat-ingress
spec:
  rules:
    - host: api.agentes-chat.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentes-chat-backend
                port:
                  number: 80
