# Configuración nginx para servir el frontend (SPA) en producción.
# Incluye fallback a index.html para el enrutado del lado del cliente
# y un proxy /api hacia el backend dentro de la red de contenedores.

upstream backend {
  server backend:4000;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Assets estáticos con cache agresiva
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy de la API al backend
  location /api/ {
    proxy_pass http://backend/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: cualquier ruta desconocida sirve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
