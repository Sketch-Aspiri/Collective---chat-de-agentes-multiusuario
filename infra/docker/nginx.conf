# Configuración nginx para servir el frontend (SPA) en producción.
# Incluye fallback a index.html para el enrutado del lado del cliente,
# proxy /api y /socket.io hacia el backend, rate limiting y headers de seguridad.
#
# Este archivo se incluye dentro del contexto http{} de nginx, por lo que
# limit_req_zone (que debe ir en http{}) se declara aquí, fuera del server{}.

# Rate limiting: 100 req/min por IP (requisito no funcional del proyecto).
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

upstream backend {
  server backend:4000;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Headers de seguridad básicos
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # No exponer la versión de nginx
  server_tokens off;

  # Assets estáticos con cache agresiva
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy de la API al backend, con rate limiting (burst de 20 sin retardo)
  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://backend/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket (Socket.io): requiere upgrade de la conexión HTTP
  location /socket.io/ {
    proxy_pass http://backend/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: cualquier ruta desconocida sirve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
