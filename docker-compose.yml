services:
  postgres:
    image: postgres:15-alpine
    container_name: agentes-chat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-agentes_chat}
    ports:
      # Host 5433 -> contenedor 5432 (evita choque con un Postgres local en 5432)
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-agentes_chat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agentes-chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.backend
      target: development
    container_name: agentes-chat-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      # Dentro de la red de compose el host es "postgres" y el puerto interno 5432
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-agentes_chat}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-bytes-min}
    ports:
      - "4000:4000"
    healthcheck:
      # Liveness del backend contra GET /health (sin deps externas). node ya está en la imagen.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot-reload: montamos código fuente y schema; node_modules queda dentro del contenedor
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - /app/node_modules
    # Aplica migraciones pendientes y arranca el server con hot-reload
    command: sh -c "npx prisma migrate deploy && npm run dev"

  frontend:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.frontend
      target: development
    container_name: agentes-chat-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:4000}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    # --host 0.0.0.0 hace accesible el dev server de Vite desde el host
    command: sh -c "npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  redis_data:
